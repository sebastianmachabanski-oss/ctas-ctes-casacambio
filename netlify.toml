[build]
  # Se borra .next/cache antes de desplegar: es el caché de build (puede pesar cientos
  # de MB y hacía fallar la subida con HTTP 500). No se necesita en runtime.
  command = "npm run build && rm -rf .next/cache"
  publish = ".next"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-nextjs"
